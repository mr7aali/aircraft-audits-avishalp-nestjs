<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Ground Board — Flight Audit System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --bg2: #10141c;
            --bg3: #161b26;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.13);
            --text: #f0f2f7;
            --muted: #6b7280;
            --dim: #374151;
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.12);
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.12);
            --purple: #a78bfa;
            --purple-dim: rgba(167, 139, 250, 0.12);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.12);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg3);
        }

        .logo-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--text);
        }

        .logo-sub {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
            letter-spacing: 0.08em;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 20px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--green);
            background: var(--green-dim);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 1.6s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.2;
            }
        }

        .last-update {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
        }

        .config-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .config-bar label {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            white-space: nowrap;
        }

        .config-bar input {
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            padding: 7px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .config-bar input:focus {
            border-color: var(--blue);
        }

        .config-bar input[type="date"],
        .config-bar input[type="time"] {
            color-scheme: dark;
        }

        #dateIn {
            width: 140px;
        }

        #timeFrom,
        #timeTo {
            width: 90px;
        }

        .config-divider {
            width: 1px;
            height: 24px;
            background: var(--border2);
            flex-shrink: 0;
        }

        .airport-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        #airportIn {
            width: 100px;
            text-transform: uppercase;
            padding-right: 28px;
        }

        #airportIn.has-match {
            border-color: var(--green);
        }

        #airportIn.no-match {
            border-color: var(--amber);
        }

        .airport-resolved {
            position: absolute;
            right: 7px;
            font-size: 10px;
            font-family: var(--mono);
            color: var(--green);
            pointer-events: none;
        }

        .airport-hint {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--amber);
            display: none;
        }

        .quick-btns {
            display: flex;
            gap: 4px;
        }

        .qbtn {
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 20px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 10px;
            padding: 3px 9px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .qbtn:hover {
            color: var(--text);
            border-color: var(--blue);
        }

        .qbtn.active {
            color: var(--blue);
            border-color: var(--blue);
            background: var(--blue-dim);
        }

        .window-note {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            padding: 3px 9px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            white-space: nowrap;
        }

        .btn-watch {
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 700;
            padding: 8px 20px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-watch:hover {
            opacity: 0.88;
        }

        .btn-watch:active {
            transform: scale(0.97);
        }

        .btn-stop {
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            font-family: var(--sans);
            font-size: 12px;
            padding: 7px 14px;
            cursor: pointer;
            display: none;
        }

        .btn-stop:hover {
            background: var(--red-dim);
        }

        .err-msg {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--red);
            flex-basis: 100%;
            display: none;
        }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 32px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .search-box {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            padding: 7px 12px;
            outline: none;
            width: 220px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--blue);
        }

        .fbtns {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }

        .fbtn {
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 20px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 11px;
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .fbtn:hover {
            color: var(--text);
        }

        .fbtn.active {
            border-color: var(--blue);
            color: var(--blue);
            background: var(--blue-dim);
        }

        .fbtn.f-landed.active {
            border-color: var(--green);
            color: var(--green);
            background: var(--green-dim);
        }

        .fbtn.f-onground.active {
            border-color: var(--amber);
            color: var(--amber);
            background: var(--amber-dim);
        }

        .fbtn.f-departed.active {
            border-color: var(--purple);
            color: var(--purple);
            background: var(--purple-dim);
        }

        .count-badge {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            margin-left: auto;
        }

        .main {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 175px);
            overflow: hidden;
        }

        .cards-area {
            overflow-y: auto;
            padding: 24px 24px 24px 32px;
            scrollbar-width: thin;
            scrollbar-color: var(--dim) transparent;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .empty-state {
            grid-column: 1/-1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 80px 0;
            color: var(--muted);
        }

        .empty-state svg {
            opacity: 0.3;
        }

        .empty-state p {
            font-family: var(--mono);
            font-size: 13px;
            text-align: center;
            line-height: 1.7;
        }

        .fcard {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
            animation: cardIn 0.3s ease both;
            position: relative;
            overflow: hidden;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fcard:hover {
            border-color: var(--border2);
            background: var(--bg3);
        }

        .fcard.selected {
            border-color: var(--blue);
            background: var(--bg3);
        }

        .fcard.selected::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--blue);
            border-radius: 12px 0 0 12px;
        }

        .fcard-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .fcard-flight {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        .fcard-airline {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
            font-weight: 400;
        }

        .fcard-route {
            margin-top: 8px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--blue);
            letter-spacing: 0.04em;
        }

        .status-pill {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }

        .s-approaching {
            background: var(--purple-dim);
            color: var(--purple);
            border: 1px solid rgba(167, 139, 250, 0.25);
        }

        .s-landed {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .s-onground {
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }

        .s-departed {
            background: var(--blue-dim);
            color: var(--blue);
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .fcard-rows {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 12px;
        }

        .fcard-row {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr);
            gap: 10px;
            align-items: start;
        }

        .fcard-lbl {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .fcard-val {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--text);
            font-weight: 500;
            text-align: right;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .ground-timer {
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .timer-label {
            font-size: 13px;
            font-family: var(--mono);
            font-weight: 700;
            min-width: 40px;
        }

        .timer-track {
            flex: 1;
            height: 3px;
            background: var(--dim);
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-fill {
            height: 3px;
            border-radius: 2px;
            transition: width 1s linear;
        }

        .timer-note {
            font-size: 10px;
            color: var(--muted);
            font-family: var(--mono);
        }

        /* AUDIT PANEL */
        .audit-panel {
            border-left: 1px solid var(--border);
            background: var(--bg2);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--dim) transparent;
            display: flex;
            flex-direction: column;
        }

        .audit-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: var(--muted);
            padding: 40px;
        }

        .audit-empty svg {
            opacity: 0.2;
        }

        .audit-empty p {
            font-family: var(--mono);
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
        }

        .audit-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .audit-header-sec {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .plane-avatar {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: var(--blue-dim);
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .audit-flight-name {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .audit-flight-sub {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--muted);
            margin-top: 3px;
        }

        .close-btn {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: 6px;
            color: var(--muted);
            font-size: 12px;
            padding: 5px 10px;
            cursor: pointer;
            font-family: var(--mono);
            flex-shrink: 0;
        }

        .close-btn:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mcard {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
        }

        .mcard-lbl {
            font-size: 10px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 5px;
        }

        .mcard-val {
            font-size: 22px;
            font-weight: 800;
            font-family: var(--mono);
        }

        .mcard-unit {
            font-size: 12px;
            font-weight: 400;
            color: var(--muted);
            margin-left: 3px;
        }

        .tl-section-title {
            font-size: 11px;
            font-family: var(--mono);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .timeline {
            position: relative;
            padding-left: 28px;
        }

        .tl-step {
            position: relative;
            padding-bottom: 22px;
        }

        .tl-step:last-child {
            padding-bottom: 0;
        }

        .tl-node {
            position: absolute;
            left: -28px;
            top: 3px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--dim);
            background: var(--bg2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .tl-node-inner {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dim);
        }

        .tl-node.done {
            border-color: var(--green);
        }

        .tl-node.done .tl-node-inner {
            background: var(--green);
        }

        .tl-node.active {
            border-color: var(--amber);
            animation: nodePulse 1.5s ease-in-out infinite;
        }

        .tl-node.active .tl-node-inner {
            background: var(--amber);
        }

        @keyframes nodePulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
            }

            50% {
                box-shadow: 0 0 0 5px rgba(245, 158, 11, 0);
            }
        }

        .tl-connector {
            position: absolute;
            left: -21px;
            top: 19px;
            width: 1px;
            height: calc(100% - 12px);
            background: var(--border2);
        }

        .tl-step:last-child .tl-connector {
            display: none;
        }

        .tl-step-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }

        .tl-step-label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .tl-live-tag {
            font-size: 9px;
            font-family: var(--mono);
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.25);
            padding: 1px 6px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* NEW: real data tag — green */
        .tl-real-tag {
            font-size: 9px;
            font-family: var(--mono);
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.25);
            padding: 1px 6px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .tl-step-time {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--muted);
            white-space: pre-line;
        }

        .tl-step-note {
            font-size: 11px;
            color: var(--dim);
            font-family: var(--mono);
            margin-top: 2px;
            white-space: pre-line;
        }

        /* NEW: loading spinner for secondary call */
        .tl-loading {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 0;
        }

        .tl-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border2);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .tl-loading-text {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
        }

        /* NEW: data source banner */
        .data-source-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-family: var(--mono);
            border: 1px solid;
        }

        .dsb-real {
            background: var(--green-dim);
            border-color: rgba(34, 197, 94, 0.25);
            color: var(--green);
        }

        .dsb-projected {
            background: var(--amber-dim);
            border-color: rgba(245, 158, 11, 0.25);
            color: var(--amber);
        }

        .dsb-icon {
            font-size: 13px;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .details-table td {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .details-table tr:last-child td {
            border-bottom: none;
        }

        .details-table .dl {
            color: var(--muted);
            font-family: var(--mono);
            font-size: 11px;
            width: 42%;
        }

        .details-table .dv {
            color: var(--text);
            font-family: var(--mono);
            font-weight: 500;
        }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--blue);
            transform-origin: left;
            transform: scaleX(0);
            transition: transform 0.4s ease;
            z-index: 200;
        }

        .loading-bar.active {
            transform: scaleX(0.8);
        }

        .loading-bar.done {
            transform: scaleX(1);
            transition: transform 0.1s;
            opacity: 0;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dim);
            border-radius: 2px;
        }

        @media(max-width:768px) {
            .main {
                grid-template-columns: 1fr;
            }

            .audit-panel {
                border-left: none;
                border-top: 1px solid var(--border);
                height: auto;
            }

            header {
                padding: 14px 16px;
            }

            .config-bar,
            .filter-bar {
                padding: 10px 16px;
            }

            .cards-area {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="loading-bar" id="loadingBar"></div>

    <header>
        <div class="logo">
            <div class="logo-icon">

    <div class="main">

    <script>
        // ─── IATA → ICAO lookup ───
        const IATA_TO_ICAO = {
            JFK: 'KJFK', LAX: 'KLAX', ORD: 'KORD', ATL: 'KATL', DFW: 'KDFW', DEN: 'KDEN', SFO: 'KSFO', SEA: 'KSEA', LAS: 'KLAS', MIA: 'KMIA', CLT: 'KCLT', PHX: 'KPHX', IAH: 'KIAH', MCO: 'KMCO', EWR: 'KEWR', MSP: 'KMSP', DTW: 'KDTW', BOS: 'KBOS', PHL: 'KPHL', LGA: 'KLGA', BWI: 'KBWI', SLC: 'KSLC', SAN: 'KSAN', IAD: 'KIAD', DCA: 'KDCA', MDW: 'KMDW', HNL: 'PHNL', ANC: 'PANC', PDX: 'KPDX', STL: 'KSTL',
            LHR: 'EGLL', LGW: 'EGKK', STN: 'EGSS', LTN: 'EGGW', MAN: 'EGCC', EDI: 'EGPH', CDG: 'LFPG', ORY: 'LFPO', AMS: 'EHAM', FRA: 'EDDF', MUC: 'EDDM', BER: 'EDDB', MAD: 'LEMD', BCN: 'LEBL', FCO: 'LIRF', MXP: 'LIMC', ZRH: 'LSZH', VIE: 'LOWW', CPH: 'EKCH', ARN: 'ESSA', HEL: 'EFHK', OSL: 'ENGM', LIS: 'LPPT', DUB: 'EIDW', ATH: 'LGAV', IST: 'LTFM', SAW: 'LTFJ', BRU: 'EBBR', WAW: 'EPWA', PRG: 'LKPR', BUD: 'LHBP', OTP: 'LROP', SOF: 'LBSF',
            DXB: 'OMDB', AUH: 'OMAA', DOH: 'OTHH', KWI: 'OKBK', BAH: 'OBBI', AMM: 'OJAI', BEY: 'OLBA', TLV: 'LLBG', RUH: 'OERK', JED: 'OEJN', MCT: 'OOMS',
            SIN: 'WSSS', KUL: 'WMKK', BKK: 'VTBS', HKG: 'VHHH', ICN: 'RKSI', NRT: 'RJAA', HND: 'RJTT', PEK: 'ZBAA', PVG: 'ZSPD', CAN: 'ZGGG', CTU: 'ZUUU', XIY: 'ZLXY', DEL: 'VIDP', BOM: 'VABB', MAA: 'VOMM', HYD: 'VOHS', BLR: 'VOBL', CCU: 'VECC', CGP: 'VGEG', DAC: 'VGHS', CMB: 'VCBI', KTM: 'VNKT', MNL: 'RPLL', CGK: 'WIII', DPS: 'WADD', KHI: 'OPKC', LHE: 'OPLA', ISB: 'OPIS',
            ZYL: 'VGSY', CXB: 'VGCB', JSR: 'VGJR', BZL: 'VGBR', RJH: 'VGRJ',
            CAI: 'HECA', JNB: 'FAOR', CPT: 'FACT', NBO: 'HKJK', ADD: 'HAAB', LOS: 'DNMM', ACC: 'DGAA', CMN: 'GMMN', TUN: 'DTTA', ALG: 'DAAG',
            YYZ: 'CYYZ', YVR: 'CYVR', YUL: 'CYUL', YYC: 'CYYC', YEG: 'CYEG', GRU: 'SBGR', BOG: 'SKBO', LIM: 'SPIM', SCL: 'SCEL', EZE: 'SAEZ', MEX: 'MMMX', SYD: 'YSSY', MEL: 'YMML', BNE: 'YBBN', AKL: 'NZAA',
        };

        const DISPLAY_DASH = '—';
        const LIVE_REFRESH_MS = 30000;
        const DEMO_REFRESH_MS = 10000;
        const NOW_WINDOW_HOURS = 12;
        const MAX_API_WINDOW_HOURS = 12;
        const PROJECTED_TAXI_TO_GATE_MIN = 8;
        const PROJECTED_TURNAROUND_MIN = 75;

        let allFlights = [];
        let selectedId = null;
        let activeFilter = 'all';
        let refreshInterval = null;
        let demoInterval = null;

        // ─── Cache for secondary reg calls: reg → {data, fetchedAt} ───
        const regCache = {};
        const REG_CACHE_TTL_MS = 60000; // 60s cache per registration

        // ─── AIRPORT INPUT ───
        function onAirportInput(el) {
            const val = el.value.toUpperCase().trim();
            const hint = document.getElementById('airportHint');
            const resolved = document.getElementById('resolvedLabel');
            el.value = val;
            if (val.length === 3 && IATA_TO_ICAO[val]) {
                el.classList.remove('no-match'); el.classList.add('has-match');
                resolved.textContent = '→ ' + IATA_TO_ICAO[val]; hint.style.display = 'none';
            } else if (val.length === 3 && !IATA_TO_ICAO[val]) {
                el.classList.remove('has-match'); el.classList.add('no-match');
                resolved.textContent = '';
                hint.textContent = 'Unknown IATA — try 4-letter ICAO (e.g. KJFK)'; hint.style.display = 'inline';
            } else if (val.length === 4) {
                el.classList.remove('has-match', 'no-match'); resolved.textContent = ''; hint.style.display = 'none';
            } else {
                el.classList.remove('has-match', 'no-match'); resolved.textContent = ''; hint.style.display = 'none';
            }
        }

        function resolveICAO() {
            const val = document.getElementById('airportIn').value.toUpperCase().trim();
            if (val.length === 3) return IATA_TO_ICAO[val] || null;
            if (val.length === 4) return val;
            return null;
        }
        function selectedAirportLabel() {
            const val = document.getElementById('airportIn').value.toUpperCase().trim();
            return val || DISPLAY_DASH;
        }

        function escapeHtml(v) {
            return String(v ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }
        function safeText(v, fallback = DISPLAY_DASH) {
            if (v === null || v === undefined || v === '') return fallback;
            if (typeof v === 'string' && ['null', 'undefined', 'nan'].includes(v.trim().toLowerCase())) return fallback;
            return escapeHtml(v);
        }
        function normalizeDelay(v) { const p = Number(v); return Number.isFinite(p) ? p : 0; }
        function airportCode(a) { return a?.iata || a?.icao || null; }
        function airportName(a) { return a?.name || DISPLAY_DASH; }
        function airportLabel(a) { return airportCode(a) || airportName(a); }
        function firstDisplayValue(...values) {
            for (const value of values) {
                if (hasDisplayValue(value)) return value;
            }
            return DISPLAY_DASH;
        }
        function extractGate(primary, secondary, flight) {
            return firstDisplayValue(
                primary?.gate,
                primary?.gateNumber,
                primary?.gateName,
                primary?.movement?.gate,
                primary?.movement?.gateNumber,
                secondary?.gate,
                secondary?.gateNumber,
                secondary?.gateName,
                flight?.gate,
                flight?.movement?.gate,
                flight?.movement?.gateNumber,
                flight?.movement?.gateName
            );
        }
        function extractTerminal(primary, secondary, flight) {
            return firstDisplayValue(
                primary?.terminal,
                primary?.terminalName,
                secondary?.terminal,
                secondary?.terminalName,
                flight?.terminal,
                flight?.movement?.terminal,
                flight?.movement?.terminalName
            );
        }
        function extractBaggageBelt(primary, secondary, flight) {
            return firstDisplayValue(
                primary?.baggageBelt,
                primary?.baggageClaim,
                secondary?.baggageBelt,
                secondary?.baggageClaim,
                flight?.baggageBelt,
                flight?.movement?.baggageBelt
            );
        }
        function buildFlightId(parts) { return parts.filter(Boolean).join('-').replace(/[^a-zA-Z0-9_-]+/g, '-'); }
        function normalizeFlightNumber(v) { return String(v || '').replace(/\s+/g, '').toUpperCase(); }
        function extractRegistration(f) {
            return f?.aircraft?.reg
                || f?.aircraft?.registration
                || f?.aircraft?.tail
                || f?.aircraft?.number
                || f?.reg
                || f?.registration
                || f?.movement?.aircraft?.reg
                || f?.movement?.registration
                || DISPLAY_DASH;
        }
        function extractShipNumber(f) {
            return f?.aircraft?.modeS
                || f?.aircraft?.modes
                || f?.aircraft?.mode_s
                || f?.aircraft?.serialNo
                || f?.aircraft?.icao24
                || f?.aircraft?.hex
                || f?.modeS
                || f?.mode_s
                || f?.icao24
                || f?.hex
                || f?.movement?.aircraft?.modeS
                || f?.movement?.aircraft?.icao24
                || f?.movement?.modeS
                || f?.movement?.icao24
                || DISPLAY_DASH;
        }
        function hasDisplayValue(v) {
            if (v === null || v === undefined || v === '' || v === DISPLAY_DASH) return false;
            if (typeof v === 'string' && ['null', 'undefined', 'nan'].includes(v.trim().toLowerCase())) return false;
            return true;
        }
        function preferValue(current, incoming) {
            return hasDisplayValue(incoming) && !hasDisplayValue(current) ? incoming : current;
        }
        function preferTime(current, incoming) {
            return incoming && !current ? incoming : current;
        }
        function flightDataScore(f) {
            return [
                f.reg, f.shipNo, f.gate, f.terminal, f.baggageBelt, f.origin, f.dest, f.originName, f.destName,
                f._landedAt, f._departedAt, f._revisedArr, f._predictedArr, f._runwayArr, f._revisedDep, f._predictedDep, f._runwayDep
            ].reduce((score, value) => score + (hasDisplayValue(value) ? 1 : 0), 0);
        }
        function mergeFlightRecords(existing, incoming) {
            if (!existing) return incoming;
            const keep = flightDataScore(incoming) > flightDataScore(existing) ? { ...incoming } : { ...existing };
            const other = keep === incoming ? existing : incoming;

            keep._status = keep._status === 'departed' || other._status === 'departed'
                ? 'departed'
                : keep._status === 'on-ground' || other._status === 'on-ground'
                    ? 'on-ground'
                    : keep._status === 'landed' || other._status === 'landed'
                        ? 'landed'
                        : keep._status;

            [
                'flight', 'callSign', 'airline', 'reg', 'shipNo', 'acType', 'aircraftType', 'airport', 'gate', 'terminal', 'baggageBelt',
                'origin', 'dest', 'originName', 'destName', 'iata', 'icao',
                '_nextLegFlight', '_nextLegDest', '_nextLegDestName', '_nextLegGate', '_nextLegTerminal', '_nextLegAirline',
                '_nextLegDataSource', '_nextLegLookupMode', '_nextLegLookupValue'
            ].forEach(key => {
                keep[key] = preferValue(keep[key], other[key]);
            });

            [
                '_landedAt', '_departedAt', '_scheduledArr', '_scheduledDep', '_revisedArr', '_predictedArr', '_runwayArr',
                '_revisedDep', '_predictedDep', '_runwayDep', '_nextScheduledDep', '_nextRevisedDep', '_nextPredictedDep', '_nextRunwayDep'
            ].forEach(key => {
                keep[key] = preferTime(keep[key], other[key]);
            });

            keep._depDelay = Math.max(Number(keep._depDelay) || 0, Number(other._depDelay) || 0);
            keep._arrDelay = Math.max(Number(keep._arrDelay) || 0, Number(other._arrDelay) || 0);

            return keep;
        }
        function roundedMinuteStamp(value, minuteStep = 5) {
            const d = parseTS(value);
            if (!d) return '';
            const roundedMinutes = Math.round(d.getMinutes() / minuteStep) * minuteStep;
            d.setSeconds(0, 0);
            d.setMinutes(roundedMinutes);
            return d.toISOString().slice(0, 16);
        }
        function siblingFlightKey(f) {
            const basisTime = f._direction === 'departure'
                ? firstValidTime(f._scheduledDep, f._revisedDep, f._predictedDep, f._departedAt)
                : firstValidTime(f._scheduledArr, f._revisedArr, f._predictedArr, f._landedAt);
            return [
                f._direction,
                roundedMinuteStamp(basisTime),
                f.origin || '',
                f.dest || '',
                f.terminal || '',
                f.aircraftType || '',
            ].join('|');
        }
        function enrichSiblingFlights(list) {
            const groups = {};
            list.forEach(f => {
                const key = siblingFlightKey(f);
                if (!key.replace(/\|/g, '')) return;
                (groups[key] ||= []).push(f);
            });

            Object.values(groups).forEach(group => {
                if (group.length < 2) return;
                const richest = group
                    .slice()
                    .sort((a, b) => flightDataScore(b) - flightDataScore(a))[0];

                group.forEach(f => {
                    if (f === richest) return;
                    [
                        'reg', 'shipNo', 'gate', 'terminal', 'baggageBelt',
                        '_revisedArr', '_predictedArr', '_runwayArr',
                        '_revisedDep', '_predictedDep', '_runwayDep'
                    ].forEach(key => {
                        if (!hasDisplayValue(f[key]) && hasDisplayValue(richest[key])) f[key] = richest[key];
                    });
                });
            });

            return list;
        }
        function resolvedFlightNumber(value) {
            return normalizeFlightNumber(value || '');
        }
        function resolveAircraftIdentity(f) {
            let resolvedReg = hasDisplayValue(f?.reg) ? f.reg : DISPLAY_DASH;
            let resolvedShipNo = hasDisplayValue(f?.shipNo) ? f.shipNo : DISPLAY_DASH;

            if (hasDisplayValue(resolvedReg) && hasDisplayValue(resolvedShipNo)) {
                return { reg: resolvedReg, shipNo: resolvedShipNo };
            }

            const baseFlight = resolvedFlightNumber(f?.flight);
            const baseCallSign = resolvedFlightNumber(f?.callSign);
            const baseBasis = parseTS(f?._direction === 'departure' ? departureBasisTime(f) : arrivalBasisTime(f));

            function adopt(reg, shipNo) {
                if (!hasDisplayValue(resolvedReg) && hasDisplayValue(reg)) resolvedReg = reg;
                if (!hasDisplayValue(resolvedShipNo) && hasDisplayValue(shipNo)) resolvedShipNo = shipNo;
            }

            function scoreMatch(candidate) {
                if (!candidate) return -1;
                let score = 0;

                const candidateFlight = resolvedFlightNumber(candidate.flight || candidate.number || candidate.iataNumber);
                const candidateCallSign = resolvedFlightNumber(candidate.callSign);
                if (baseFlight && candidateFlight && baseFlight === candidateFlight) score += 8;
                if (baseCallSign && candidateCallSign && baseCallSign === candidateCallSign) score += 8;

                const candidateDirection = candidate._direction || null;
                if (candidateDirection && f?._direction && candidateDirection === f._direction) score += 1;

                const candidateOrigin = candidate.origin || airportCode(candidate.departure?.airport) || '';
                const candidateDest = candidate.dest || airportCode(candidate.arrival?.airport) || '';
                if (hasDisplayValue(f?.origin) && hasDisplayValue(candidateOrigin) && f.origin === candidateOrigin) score += 2;
                if (hasDisplayValue(f?.dest) && hasDisplayValue(candidateDest) && f.dest === candidateDest) score += 2;
                if (hasDisplayValue(f?.terminal) && hasDisplayValue(candidate.terminal) && f.terminal === candidate.terminal) score += 1;
                if (hasDisplayValue(f?.aircraftType) && hasDisplayValue(candidate.aircraftType || candidate.aircraft?.model) && f.aircraftType === (candidate.aircraftType || candidate.aircraft?.model)) score += 1;

                const candidateBasisRaw = candidate._direction === 'departure'
                    ? departureBasisTime(candidate)
                    : candidate._direction === 'arrival'
                        ? arrivalBasisTime(candidate)
                        : extractTime(candidate.departure?.scheduledTime) || extractTime(candidate.arrival?.scheduledTime);
                const candidateBasis = parseTS(candidateBasisRaw);
                if (baseBasis && candidateBasis) {
                    const deltaMinutes = Math.abs(baseBasis.getTime() - candidateBasis.getTime()) / 60000;
                    if (deltaMinutes <= 10) score += 4;
                    else if (deltaMinutes <= 30) score += 2;
                    else if (deltaMinutes <= 60) score += 1;
                }

                if (!hasDisplayValue(candidate.reg) && !hasDisplayValue(candidate.shipNo) && !hasDisplayValue(candidate.aircraft?.reg) && !hasDisplayValue(candidate.aircraft?.modeS)) {
                    score -= 2;
                }

                return score;
            }

            const directRaw = rawFlightMap[f?._id];
            if (directRaw) adopt(extractRegistration(directRaw), extractShipNumber(directRaw));

            if (hasDisplayValue(resolvedReg) && hasDisplayValue(resolvedShipNo)) {
                return { reg: resolvedReg, shipNo: resolvedShipNo };
            }

            let bestCandidate = null;
            let bestScore = -1;

            allFlights.forEach(candidate => {
                if (!candidate || candidate === f) return;
                const score = scoreMatch(candidate);
                if (score > bestScore) {
                    bestScore = score;
                    bestCandidate = candidate;
                }
            });

            Object.values(rawFlightMap).forEach(candidate => {
                const score = scoreMatch(candidate);
                if (score > bestScore) {
                    bestScore = score;
                    bestCandidate = candidate;
                }
            });

            if (bestCandidate && bestScore >= 8) {
                adopt(extractRegistration(bestCandidate), extractShipNumber(bestCandidate));
            }

            return {
                reg: hasDisplayValue(resolvedReg) ? resolvedReg : DISPLAY_DASH,
                shipNo: hasDisplayValue(resolvedShipNo) ? resolvedShipNo : DISPLAY_DASH,
            };
        }
        function hasTime(v) { return !!parseTS(v); }
        function firstValidTime(...vals) { return vals.find(hasTime) || null; }
        function timeKey(v) { const d = parseTS(v); return d ? d.toISOString() : ''; }

        function buildTimeSummary(entries, fallback = DISPLAY_DASH) {
            const seen = new Set(); const lines = [];
            entries.forEach(([label, value]) => {
                if (!hasTime(value)) return;
                const k = timeKey(value);
                if (!k || seen.has(k)) return;
                seen.add(k); lines.push(`${label}: ${fmt(value)}`);
            });
            return lines.length ? lines.join('\n') : fallback;
        }

        function addMinutes(v, m) {
            const b = parseTS(v); if (!b) return null;
            return new Date(b.getTime() + m * 60000).toISOString();
        }

        // ─── PROJECTION HELPERS (used ONLY when real data missing) ───
        function projectedLandingTime(f) { return firstValidTime(f._runwayArr, f._revisedArr, f._predictedArr, f._scheduledArr, f._landedAt); }
        function projectedGateInTime(f) { return firstValidTime(f._revisedArr, f._landedAt, addMinutes(projectedLandingTime(f), PROJECTED_TAXI_TO_GATE_MIN)); }
        function projectedNextOutTime(f) {
            return firstValidTime(f._nextRevisedDep, f._nextPredictedDep, f._nextScheduledDep,
                addMinutes(projectedGateInTime(f), PROJECTED_TURNAROUND_MIN),
                addMinutes(projectedLandingTime(f), PROJECTED_TAXI_TO_GATE_MIN + PROJECTED_TURNAROUND_MIN));
        }
        function projectedDepartureTime(f) { return firstValidTime(f._runwayDep, f._revisedDep, f._predictedDep, f._scheduledDep, f._departedAt); }
        function projectedBoardingTime(f) {
            return firstValidTime(addMinutes(projectedDepartureTime(f), -35), addMinutes(f._scheduledDep, -35), addMinutes(f._revisedDep, -35));
        }
        function nextLegTime(f) { return firstValidTime(f._nextRunwayDep, f._nextRevisedDep, f._nextPredictedDep, f._nextScheduledDep); }
        function arrivalBasisTime(f) { return firstValidTime(f._runwayArr, f._revisedArr, f._predictedArr, f._scheduledArr, f._landedAt); }
        function departureBasisTime(f) { return firstValidTime(f._runwayDep, f._revisedDep, f._predictedDep, f._scheduledDep, f._departedAt); }

        // ─── FILTERS ───
        function setFilter(f, btn) {
            activeFilter = f;
            document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); renderCards();
        }

        // Robust timestamp parser — handles ISO with Z, ISO no tz, space-separated
        function parseTS(val) {
            if (!val) return null;
            if (typeof val !== 'string') return null;
            const normalized = val.trim().replace(' ', 'T');
            const d = new Date(normalized);
            return isNaN(d.getTime()) ? null : d;
        }

        function fmt(val, fallback = DISPLAY_DASH) {
            const d = parseTS(val); if (!d) return fallback;
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        function fmtFull(val, fallback = DISPLAY_DASH) {
            const d = parseTS(val); if (!d) return fallback;
            return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function groundMins(f) {
            const land = parseTS(f._landedAt); if (!land) return null;
            const end = parseTS(f._departedAt) || new Date();
            const mins = Math.round((end - land) / 60000);
            return mins >= 0 ? mins : null;
        }
        function timerColor(m) { return m < 45 ? '#22c55e' : m < 90 ? '#f59e0b' : '#ef4444'; }
        function statusClass(s) { if (s === 'landed') return 's-landed'; if (s === 'on-ground') return 's-onground'; if (s === 'departed') return 's-departed'; return 's-approaching'; }
        function statusLabel(s) { if (s === 'on-ground') return 'On Ground'; return s.charAt(0).toUpperCase() + s.slice(1); }
        function cardRouteValue(f) {
            const from = safeText(hasDisplayValue(f.origin) ? f.origin : selectedAirportLabel());
            const to = safeText(hasDisplayValue(f.dest) ? f.dest : selectedAirportLabel());
            return `${from} → ${to}`;
        }
        function cardAirportValue(f) {
            return selectedAirportLabel();
            const code = f._direction === 'departure' ? f.dest : f.origin;
            const name = f._direction === 'departure' ? f.destName : f.originName;
            if (hasDisplayValue(code) && hasDisplayValue(name) && code !== name) return `${code} · ${name}`;
            if (hasDisplayValue(code)) return code;
            if (hasDisplayValue(name)) return name;
            return DISPLAY_DASH;
        }
        function cardTerminalValue(f) {
            const parts = [];
            if (hasDisplayValue(f.terminal)) parts.push(`T${f.terminal}`);
            return parts.length ? parts.join(' · ') : DISPLAY_DASH;
        }
        function cardEventLabel(f) { if (f._direction === 'departure') return f._status === 'departed' ? 'Departed' : 'STD'; return f._status === 'approaching' ? 'ETA' : 'Landed'; }
        function cardEventTime(f) {
            if (f._direction === 'departure') {
                return fmt(f._status === 'departed'
                    ? firstValidTime(f._departedAt, f._runwayDep, f._revisedDep, f._predictedDep, f._scheduledDep)
                    : firstValidTime(f._revisedDep, f._predictedDep, f._scheduledDep));
            }
            return fmt(f._status === 'approaching'
                ? firstValidTime(f._revisedArr, f._predictedArr, f._scheduledArr)
                : firstValidTime(f._landedAt, f._runwayArr, f._revisedArr, f._scheduledArr));
        }
        function cardFooterText(f) {
            if (f._status === 'departed') return 'Dep. ' + fmt(f._departedAt);
            if (f._direction === 'departure') return 'Awaiting departure';
            return f._status === 'approaching' ? 'Awaiting arrival' : 'On ground';
        }

        // ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ───
        // OPTION B: SECONDARY CALL — fetch flights by aircraft registration
        // Called when user clicks a flight card (inside selectFlight)
        // Returns enriched next-leg data and patches it onto the flight object
        // ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ─── ───
        async function fetchNextLegByReg(f) {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) return { source: 'none' };
            const reg = resolveAircraftIdentity(f).reg;
            const flightNum = normalizeFlightNumber(f.flight);
            const lookupDate = fmtDate(new Date());

            let lookupMode = null;
            let lookupValue = null;
            let cacheKey = null;
            let url = null;

            if (reg && reg !== DISPLAY_DASH) {
                lookupMode = 'reg';
                lookupValue = reg;
                cacheKey = `reg:${reg}`;
                url = `https://aerodatabox.p.rapidapi.com/flights/reg/${encodeURIComponent(reg)}?withAircraftImage=false&withLocation=false`;
            } else if (flightNum) {
                lookupMode = 'flight-number';
                lookupValue = flightNum;
                cacheKey = `flight-number:${flightNum}:${lookupDate}`;
                url = `https://aerodatabox.p.rapidapi.com/flights/number/${encodeURIComponent(flightNum)}/${encodeURIComponent(lookupDate)}?withAircraftImage=false&withLocation=false`;
            } else {
                return { source: 'no-reg-or-flight-number', lookupMode: null, lookupValue: null };
            }

            const cached = regCache[cacheKey];
            if (cached && (Date.now() - cached.fetchedAt) < REG_CACHE_TTL_MS) {
                return enrichFromRegData(f, cached.data, lookupMode, lookupValue);
            }

            try {
                const res = await fetch(url, {
                    headers: {
                        'x-rapidapi-host': 'aerodatabox.p.rapidapi.com',
                        'x-rapidapi-key': apiKey
                    }
                });

                if (!res.ok) {
                    return { source: 'api-error', status: res.status, lookupMode, lookupValue };
                }

                const rawText = await res.text();
                if (!rawText || rawText.trim() === '') return { source: 'empty', lookupMode, lookupValue };

                let json;
                try { json = JSON.parse(rawText); } catch { return { source: 'parse-error', lookupMode, lookupValue }; }

                // Cache result
                regCache[cacheKey] = { data: json, fetchedAt: Date.now() };

                return enrichFromRegData(f, json, lookupMode, lookupValue);

            } catch (e) {
                console.warn('Secondary reg call failed:', e.message);
                return { source: 'fetch-error', lookupMode, lookupValue };
            }
        }

        function flattenLookupFlights(json) {
            if (Array.isArray(json)) return json;
            if (Array.isArray(json?.flights)) return json.flights;
            const combined = [];
            if (Array.isArray(json?.arrivals)) combined.push(...json.arrivals);
            if (Array.isArray(json?.departures)) combined.push(...json.departures);
            if (Array.isArray(json?.movements)) combined.push(...json.movements);
            return combined;
        }

        // ─── Parse the secondary lookup response to extract the next leg ───
        function enrichFromRegData(f, json, lookupMode = 'reg', lookupValue = null) {
            const flights = flattenLookupFlights(json);

            if (!flights.length) return { source: 'no-flights', lookupMode, lookupValue };

            const currentArrivalTime = parseTS(arrivalBasisTime(f));
            const sorted = flights.slice().sort((a, b) => {
                const ta = parseTS(extractTime(a.departure?.scheduledTime) || extractTime(a.departure?.revisedTime) || extractTime(a.departure?.predictedTime)) || new Date(0);
                const tb = parseTS(extractTime(b.departure?.scheduledTime) || extractTime(b.departure?.revisedTime) || extractTime(b.departure?.predictedTime)) || new Date(0);
                return ta - tb;
            });

            const currentFlightNum = normalizeFlightNumber(f.flight);

            let nextFlight = null;
            for (const flight of sorted) {
                const fNum = normalizeFlightNumber(flight.number || flight.iataNumber);
                const depScheduled = parseTS(
                    extractTime(flight.departure?.scheduledTime)
                    || extractTime(flight.departure?.revisedTime)
                    || extractTime(flight.departure?.predictedTime)
                );

                if (fNum && fNum === currentFlightNum) continue;

                if (currentArrivalTime && depScheduled) {
                    if (depScheduled.getTime() < currentArrivalTime.getTime() - 30 * 60000) continue;
                }

                nextFlight = flight;
                break;
            }

            if (!nextFlight) return { source: 'no-next-found', lookupMode, lookupValue };

            const dep = nextFlight.departure || {};
            const arr = nextFlight.arrival || {};

            const nextScheduledDep = extractTime(dep.scheduledTime) || null;
            const nextRevisedDep = extractTime(dep.revisedTime) || extractTime(dep.actualTime) || null;
            const nextPredictedDep = extractTime(dep.predictedTime) || null;
            const nextRunwayDep = extractTime(dep.runwayTime) || null;

            const nextFlightNum = nextFlight.number || nextFlight.iataNumber || DISPLAY_DASH;
            const nextDestIata = airportLabel(arr.airport);
            const nextDestName = airportName(arr.airport);
            const nextGate = dep.gate || DISPLAY_DASH;
            const nextTerminal = dep.terminal || DISPLAY_DASH;
            const nextAirline = nextFlight.airline?.name || DISPLAY_DASH;

            const hasRealTime = !!(nextScheduledDep || nextRevisedDep || nextPredictedDep || nextRunwayDep);

            return {
                source: hasRealTime ? 'api-real' : 'api-no-times',
                lookupMode,
                lookupValue,
                nextScheduledDep,
                nextRevisedDep,
                nextPredictedDep,
                nextRunwayDep,
                nextFlightNum,
                nextDestIata,
                nextDestName,
                nextGate,
                nextTerminal,
                nextAirline,
                rawNextFlight: nextFlight,
            };
        }

        // ─── Apply enrichment result back onto a flight object ───
        function applyEnrichment(f, result) {
            if (result.source !== 'api-real') return;
            f._nextLegFlight = result.nextFlightNum;
            f._nextLegDest = result.nextDestIata;
            f._nextLegDestName = result.nextDestName;
            f._nextLegGate = result.nextGate;
            f._nextLegTerminal = result.nextTerminal;
            f._nextLegAirline = result.nextAirline;
            f._nextScheduledDep = result.nextScheduledDep;
            f._nextRevisedDep = result.nextRevisedDep;
            f._nextPredictedDep = result.nextPredictedDep;
            f._nextRunwayDep = result.nextRunwayDep;
            f._nextLegDataSource = 'api'; // flag for UI rendering
            f._nextLegLookupMode = result.lookupMode || null;
            f._nextLegLookupValue = result.lookupValue || null;
        }

        // ─── TIMELINE BUILDER ───
        function buildTimelineSteps(f, gm, delay) {
            const hasLanding = !!parseTS(f._landedAt);
            const hasDeparture = !!parseTS(f._departedAt);
            const hasLinkedNextLeg = !!(f._nextLegFlight || nextLegTime(f));
            const isNextLegReal = f._nextLegDataSource === 'api';
            const projectedLanding = projectedLandingTime(f);
            const projectedGateIn = projectedGateInTime(f);
            const projectedNextOut = projectedNextOutTime(f);
            const projectedDeparture = projectedDepartureTime(f);
            const projectedBoarding = projectedBoardingTime(f);

            if (f._direction === 'departure') {
                return [
                    {
                        label: 'Scheduled Out',
                        time: buildTimeSummary([
                            ['Scheduled', f._scheduledDep],
                            ['Estimated', f._revisedDep],
                            ['Predicted', f._predictedDep],
                        ], 'Pending'),
                        note: f.dest !== DISPLAY_DASH ? 'To ' + f.dest : 'Destination not available',
                        done: !!parseTS(f._scheduledDep),
                        active: false,
                        isReal: !!(f._scheduledDep || f._revisedDep),
                    },
                    {
                        label: 'At Gate',
                        time: [
                            f.gate !== DISPLAY_DASH ? 'Gate ' + f.gate : 'Gate pending',
                            f.terminal !== DISPLAY_DASH ? 'Terminal ' + f.terminal : '',
                        ].filter(Boolean).join('\n'),
                        note: buildTimeSummary([
                            ['Projected boarding', projectedBoarding],
                            ['Boarding target', f._revisedDep],
                            ['Predicted', f._predictedDep],
                        ], 'Awaiting gate-side estimate'),
                        done: hasDeparture,
                        active: !hasDeparture && f._status === 'on-ground',
                        isReal: !!(f.gate && f.gate !== DISPLAY_DASH),
                    },
                    {
                        label: 'Departed',
                        time: buildTimeSummary([
                            ['Runway', f._runwayDep],
                            ['Gate out', f._departedAt],
                            ['Estimated', f._revisedDep],
                            ['Projected', projectedDeparture],
                        ], 'Pending'),
                        note: hasDeparture ? (delay > 0 ? '+' + delay + ' min delay' : 'On schedule') : 'Awaiting departure',
                        done: hasDeparture,
                        active: false,
                        isReal: hasDeparture,
                    },
                ];
            }

            // ── ARRIVAL direction ──
            // Build next leg time summary — prefer real API data, fall back to projected
            const realNextLegSummary = isNextLegReal
                ? buildTimeSummary([
                    ['Scheduled', f._nextScheduledDep],
                    ['Estimated', f._nextRevisedDep],
                    ['Predicted', f._nextPredictedDep],
                    ['Runway', f._nextRunwayDep],
                ], null)
                : null;

            const nextLegTimeSummary = realNextLegSummary
                || buildTimeSummary([
                    ['Scheduled', f._nextScheduledDep],
                    ['Estimated', f._nextRevisedDep],
                    ['Predicted', f._nextPredictedDep],
                    ['Runway', f._nextRunwayDep],
                    ['Projected', projectedNextOut],
                ], 'Not linked');

            // Next leg note
            let nextLegNote;
            if (isNextLegReal) {
                const parts = [f._nextLegFlight || 'Next flight'];
                if (f._nextLegDest && f._nextLegDest !== DISPLAY_DASH) parts.push('→ ' + f._nextLegDest);
                if (f._nextLegDestName && f._nextLegDestName !== DISPLAY_DASH) parts.push('(' + f._nextLegDestName + ')');
                if (f._nextLegGate && f._nextLegGate !== DISPLAY_DASH) parts.push('Gate ' + f._nextLegGate);
                if (f._nextLegAirline && f._nextLegAirline !== DISPLAY_DASH) parts.push(f._nextLegAirline);
                nextLegNote = parts.join('\n');
            } else if (hasLinkedNextLeg) {
                nextLegNote = `${f._nextLegFlight || 'Next flight'}${f._nextLegDest && f._nextLegDest !== DISPLAY_DASH ? ' → ' + f._nextLegDest : ''}\n(matched from departures board)`;
            } else {
                nextLegNote = 'Projected only — outbound leg not yet fetched or not found.';
            }

            return [
                {
                    label: 'Inbound',
                    time: buildTimeSummary([
                        ['Scheduled', f._scheduledArr],
                        ['Estimated', f._revisedArr],
                        ['Predicted', f._predictedArr],
                        ['Projected', projectedLanding],
                    ], 'Inbound'),
                    note: f.origin !== DISPLAY_DASH ? 'From ' + f.origin : 'Origin not available',
                    done: hasLanding,
                    active: f._status === 'approaching',
                    isReal: !!(f._scheduledArr || f._revisedArr || f._predictedArr),
                },
                {
                    label: 'Landed',
                    time: buildTimeSummary([
                        ['Runway', f._runwayArr],
                        ['Gate in', f._revisedArr],
                        ['Actual', f._landedAt],
                        ['Projected', projectedGateIn],
                    ], 'Pending'),
                    note: f.airport + (f.gate !== DISPLAY_DASH ? '\nGate ' + f.gate : ''),
                    done: hasLanding,
                    active: f._status === 'landed',
                    isReal: !!(f._runwayArr || f._landedAt),
                },
                {
                    label: 'On Ground',
                    time: buildTimeSummary([
                        ['Arrive', firstValidTime(f._runwayArr, f._landedAt, f._revisedArr, projectedGateIn)],
                        ['Next out', firstValidTime(f._nextRevisedDep, f._nextPredictedDep, f._nextScheduledDep, projectedNextOut)],
                    ], hasLanding ? (fmt(f._landedAt) + ' → now') : 'Pending'),
                    note: gm !== null
                        ? gm + ' min since landing'
                        : (isNextLegReal ? 'Turnaround linked from aircraft rotation.' : 'Projected turnaround based on current arrival time.'),
                    done: hasLinkedNextLeg && !!nextLegTime(f),
                    active: f._status === 'on-ground',
                    isReal: isNextLegReal || gm !== null,
                },
                {
                    label: 'Next Leg',
                    time: nextLegTimeSummary,
                    note: nextLegNote,
                    done: !!nextLegTime(f),
                    active: false,
                    isReal: isNextLegReal,
                },
            ];
        }

        // ─── CARDS ───
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const q = document.getElementById('searchIn').value.toLowerCase();
            let data = allFlights.filter(f => {
                if (activeFilter !== 'all' && f._status !== activeFilter) return false;
                const ids = resolveAircraftIdentity(f);
                if (q) return (f.flight || '').toLowerCase().includes(q)
                    || (f.airline || '').toLowerCase().includes(q)
                    || String(ids.reg || '').toLowerCase().includes(q)
                    || String(ids.shipNo || '').toLowerCase().includes(q);
                return true;
            });
            document.getElementById('countBadge').textContent = data.length + ' flight' + (data.length !== 1 ? 's' : '');
            if (!data.length) {
                grid.innerHTML = `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg><p>No flights match your filter.</p></div>`;
                return;
            }
            grid.innerHTML = data.map(f => {
                const gm = (f._status === 'on-ground' || f._status === 'landed') ? groundMins(f) : null;
                const pct = gm !== null ? Math.min(Math.round(gm / 120 * 100), 100) : 0;
                const tColor = gm !== null ? timerColor(gm) : '#374151';
                const sel = selectedId === f._id ? 'selected' : '';
                const airportText = cardAirportValue(f);
                const gateText = hasDisplayValue(f.gate) ? f.gate : DISPLAY_DASH;
                const terminalText = cardTerminalValue(f);
                const ids = resolveAircraftIdentity(f);
                return `<div class="fcard ${sel}" onclick="selectFlight('${f._id}')">
  <div class="fcard-head">
    <div><div class="fcard-flight">${safeText(f.flight)}</div><div class="fcard-airline">${safeText(f.airline)}</div><div class="fcard-route">${cardRouteValue(f)}</div></div>
    <span class="status-pill ${statusClass(f._status)}">${statusLabel(f._status)}</span>
  </div>
  <div class="fcard-rows">
    <div class="fcard-row"><span class="fcard-lbl">Reg.</span><span class="fcard-val">${safeText(ids.reg)}</span></div>
    <div class="fcard-row"><span class="fcard-lbl">Ship No</span><span class="fcard-val">${safeText(ids.shipNo)}</span></div>
    <div class="fcard-row"><span class="fcard-lbl">Airport</span><span class="fcard-val">${safeText(airportText)}</span></div>
    <div class="fcard-row"><span class="fcard-lbl">Gate</span><span class="fcard-val">${safeText(gateText)}</span></div>
    <div class="fcard-row"><span class="fcard-lbl">Terminal</span><span class="fcard-val">${safeText(terminalText)}</span></div>
    <div class="fcard-row"><span class="fcard-lbl">${cardEventLabel(f)}</span><span class="fcard-val">${cardEventTime(f)}</span></div>
  </div>
  ${gm !== null
                        ? `<div class="ground-timer"><span class="timer-label" style="color:${tColor};">${gm}m</span><div class="timer-track"><div class="timer-fill" style="width:${pct}%;background:${tColor};"></div></div><span class="timer-note">on ground</span></div>`
                        : `<div class="ground-timer"><span style="font-size:11px;font-family:var(--mono);color:var(--muted);">${cardFooterText(f)}</span></div>`
                    }
</div>`;
            }).join('');
        }

        // ─── SELECT FLIGHT — now triggers secondary reg call ───
        async function selectFlight(id) {
            selectedId = id;
            renderCards();
            const f = allFlights.find(x => x._id === id);
            if (!f) return;

            const apiKey = document.getElementById('apiKey').value.trim();

            // Only do secondary call for arrivals (need next leg), not departures
            // and only when not in demo mode
            if (f._direction === 'arrival' && apiKey) {
                // Render immediately with loading state in audit panel
                renderAudit(f, true /* loading */);

                // Fire secondary call
                const result = await fetchNextLegByReg(f);

                // Apply enrichment to flight object if real data found
                applyEnrichment(f, result);

                // Re-render audit panel with enriched data
                renderAudit(f, false, result);
            } else {
                renderAudit(f, false);
            }
        }

        // ─── AUDIT PANEL RENDER ───
        function renderAudit(f, loading = false, regResult = null) {
            const gm = groundMins(f);
            const delay = f._direction === 'arrival' ? (f._arrDelay || 0) : (f._depDelay || 0);
            const ids = resolveAircraftIdentity(f);
            const delayLabel = f._direction === 'arrival' ? 'Arrival delay' : 'Departure delay';
            const scheduledLabel = f._direction === 'arrival' ? 'Sched. arrival' : 'Sched. departure';
            const revisedLabel = f._direction === 'arrival' ? 'Estimated arrival' : 'Estimated departure';
            const predictedLabel = f._direction === 'arrival' ? 'Predicted arrival' : 'Predicted departure';
            const runwayLabel = f._direction === 'arrival' ? 'Runway arrival' : 'Runway departure';
            const projectedLabel = f._direction === 'arrival' ? 'Projected next out' : 'Projected departure';
            const steps = buildTimelineSteps(f, gm, delay);
            const projectedValue = f._direction === 'arrival' ? projectedNextOutTime(f) : projectedDepartureTime(f);
            const isNextLegReal = f._nextLegDataSource === 'api';

            // Data source banner
            let bannerHtml = '';
            if (f._direction === 'arrival') {
                if (loading) {
                    const loadingMode = ids.reg && ids.reg !== DISPLAY_DASH
                        ? `registration <strong>${safeText(ids.reg)}</strong>`
                        : `flight number <strong>${safeText(f.flight)}</strong>`;
                    bannerHtml = `<div class="data-source-banner dsb-projected"><span class="tl-spinner" style="display:inline-block;"></span>&nbsp;Fetching real next-leg data by ${loadingMode}…</div>`;
                } else if (isNextLegReal) {
                    const lookupText = f._nextLegLookupMode === 'flight-number'
                        ? `flight number <strong>${safeText(f._nextLegLookupValue || f.flight)}</strong> (no registration in API data)`
                        : `registration <strong>${safeText(f._nextLegLookupValue || ids.reg)}</strong>`;
                    bannerHtml = `<div class="data-source-banner dsb-real"><span class="dsb-icon">✓</span> Next Leg times are real API data looked up by ${lookupText}</div>`;
                } else if (!document.getElementById('apiKey').value.trim()) {
                    bannerHtml = `<div class="data-source-banner dsb-projected"><span class="dsb-icon">⚠</span> Demo mode — Next Leg times are projected estimates only</div>`;
                } else {
                    const reason = regResult ? regResult.source : 'unknown';
                    const reasonText = {
                        'no-next-found': 'No outbound flight found for this aircraft today.',
                        'api-error': 'Lookup endpoint returned an error.',
                        'empty': 'No data returned for this lookup.',
                        'no-flights': 'No flights listed for this lookup.',
                        'no-reg-or-flight-number': 'No registration or flight number available for lookup.',
                        'api-no-times': 'Next flight found but no times available yet.',
                        'parse-error': 'Lookup response could not be parsed.',
                        'fetch-error': 'Lookup request failed.',
                    }[reason] || 'Could not fetch real next-leg data.';
                    const attemptedLookup = regResult?.lookupMode === 'flight-number'
                        ? `Looked up by flight number ${safeText(regResult.lookupValue || f.flight)}.`
                        : regResult?.lookupMode === 'reg'
                            ? `Looked up by registration ${safeText(regResult.lookupValue || ids.reg)}.`
                            : (ids.reg && ids.reg !== DISPLAY_DASH
                                ? `Looked up by registration ${safeText(ids.reg)}.`
                                : `Looked up by flight number ${safeText(f.flight)}.`);
                    bannerHtml = `<div class="data-source-banner dsb-projected"><span class="dsb-icon">⚠</span> Next Leg projected — ${attemptedLookup} ${reasonText}</div>`;
                }
            }

            document.getElementById('auditEmpty').style.display = 'none';
            const content = document.getElementById('auditContent');
            content.style.display = 'block';
            content.innerHTML = `<div class="audit-content">
<div class="audit-header-sec">
  <div class="plane-avatar"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>
  <div><div class="audit-flight-name">${safeText(f.flight)}</div><div class="audit-flight-sub">${safeText(f.airline)} · ${safeText(f.aircraftType)}</div></div>
  <button class="close-btn" onclick="closeAudit()">close ×</button>
</div>

${bannerHtml}

<div class="metrics-grid">
  <div class="mcard"><div class="mcard-lbl">Ground time</div><div class="mcard-val" style="color:${gm !== null ? timerColor(gm) : 'var(--muted)'}">${gm !== null ? gm : '—'}<span class="mcard-unit">${gm !== null ? 'min' : ''}</span></div></div>
  <div class="mcard"><div class="mcard-lbl">${delayLabel}</div><div class="mcard-val" style="color:${delay > 15 ? '#ef4444' : '#22c55e'}">${delay > 0 ? '+' + delay : '0'}<span class="mcard-unit">min</span></div></div>
  <div class="mcard"><div class="mcard-lbl">Landed</div><div class="mcard-val" style="font-size:18px;">${fmt(f._landedAt)}</div></div>
  <div class="mcard"><div class="mcard-lbl">Departed</div><div class="mcard-val" style="font-size:18px;">${fmt(f._departedAt)}</div></div>
</div>

<div><div class="tl-section-title">Ground event timeline</div>
<div class="timeline">
${steps.map(s => `
<div class="tl-step">
  <div class="tl-node ${s.done ? 'done' : s.active ? 'active' : ''}"><div class="tl-node-inner"></div></div>
  <div class="tl-connector"></div>
  <div class="tl-step-head">
    <span class="tl-step-label" style="color:${s.active ? '#f59e0b' : s.done ? '#f0f2f7' : '#6b7280'}">${safeText(s.label)}</span>
    ${s.active ? '<span class="tl-live-tag">live</span>' : ''}
    ${s.isReal && !s.active ? '<span class="tl-real-tag">real</span>' : ''}
    ${loading && s.label === 'Next Leg' ? '<div class="tl-loading"><div class="tl-spinner"></div><span class="tl-loading-text">fetching…</span></div>' : ''}
  </div>
  <div class="tl-step-time">${safeText(s.time)}</div>
