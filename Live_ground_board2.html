        function closeAudit() {
            selectedId = null;
            document.getElementById('auditEmpty').style.display = 'flex';
            document.getElementById('auditContent').style.display = 'none';
            renderCards();
        }

        function toggleRaw(id) {
            const el = document.getElementById('raw-' + id);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // ─── PARSE HELPERS ───
        function extractTime(obj) {
            if (!obj) return null;
            if (typeof obj === 'string') return obj;
            if (obj.local) return obj.local;
            if (obj.utc) return obj.utc;
            return null;
        }

        let rawFlightMap = {};

        function parseFlights(raw) {
            rawFlightMap = {};
            const list = [];
            const byId = {};
            const selectedAirport = selectedAirportLabel();
            const process = (arr, dir) => {
                (arr || []).forEach((f, i) => {
                    const dep = f.departure || {};
                    const arr2 = f.arrival || {};
                    const isArr = dir === 'arr';

                    const arrivalScheduled = extractTime(arr2.scheduledTime) || null;
                    const arrivalRevised = extractTime(arr2.revisedTime) || extractTime(arr2.actualTime) || null;
                    const arrivalPredicted = extractTime(arr2.predictedTime) || null;
                    const arrivalRunway = extractTime(arr2.runwayTime) || null;
                    const departureScheduled = extractTime(dep.scheduledTime) || null;
                    const departureRevised = extractTime(dep.revisedTime) || extractTime(dep.actualTime) || null;
                    const departurePredicted = extractTime(dep.predictedTime) || null;
                    const departureRunway = extractTime(dep.runwayTime) || null;

                    const landedAt = isArr ? (arrivalRunway || extractTime(arr2.actualTime) || null) : null;
                    const departedAt = isArr ? null : (departureRunway || extractTime(dep.actualTime) || null);

                    const sRaw = (f.status || f.movement?.status || '').toLowerCase();

                    const safeLandedAt = parseTS(landedAt) ? landedAt : null;
                    const safeDepartedAt = parseTS(departedAt) ? departedAt : null;
                    const safeScheduledArr = parseTS(arrivalScheduled) ? arrivalScheduled : null;
                    const safeScheduledDep = parseTS(departureScheduled) ? departureScheduled : null;
                    const safeRevisedArr = parseTS(arrivalRevised) ? arrivalRevised : null;
                    const safePredictedArr = parseTS(arrivalPredicted) ? arrivalPredicted : null;
                    const safeRunwayArr = parseTS(arrivalRunway) ? arrivalRunway : null;
                    const safeRevisedDep = parseTS(departureRevised) ? departureRevised : null;
                    const safePredictedDep = parseTS(departurePredicted) ? departurePredicted : null;
                    const safeRunwayDep = parseTS(departureRunway) ? departureRunway : null;

                    let status = 'approaching';
                    if (isArr) {
                        if (sRaw.includes('ground') || sRaw.includes('boarding') || sRaw.includes('taxi')) status = 'on-ground';
                        else if (sRaw.includes('land') || sRaw.includes('arrived') || safeLandedAt) status = 'landed';
                        else status = 'approaching';
                    } else if (sRaw.includes('depart') || sRaw.includes('airborne') || sRaw.includes('en-route') || safeDepartedAt) {
                        status = 'departed';
                    } else {
                        status = 'on-ground';
                    }

                    const ac = f.aircraft || {};
                    const reg = extractRegistration(f);
                    const shipNo = extractShipNumber(f);
                    const acType = ac.model || ac.type || ac.icaoCode || ac.iataCodeLong || DISPLAY_DASH;
                    const thisApt = isArr ? arr2 : dep;
                    const otherApt = isArr ? dep : arr2;
                    const airportDisplay = selectedAirport;
                    const gate = extractGate(thisApt, otherApt, f);
                    const terminal = extractTerminal(thisApt, otherApt, f);
                    const baggageBelt = extractBaggageBelt(arr2, dep, f);
                    let originCode = airportCode(dep.airport) || DISPLAY_DASH;
                    let destCode = airportCode(arr2.airport) || DISPLAY_DASH;
                    let originName = airportName(dep.airport);
                    let destName = airportName(arr2.airport);

                    if (isArr && !hasDisplayValue(destCode)) {
                        destCode = selectedAirport;
                        destName = selectedAirport;
                    }
                    if (!isArr && !hasDisplayValue(originCode)) {
                        originCode = selectedAirport;
                        originName = selectedAirport;
                    }

                    const id = buildFlightId([
                        dir,
                        f.number || f.iataNumber || 'FL',
                        reg !== DISPLAY_DASH ? reg : 'aircraft',
                        safeScheduledArr || safeScheduledDep || safeLandedAt || safeDepartedAt || i,
                    ]);

                    const parsedFlight = {
                        _id: id,
                        _direction: isArr ? 'arrival' : 'departure',
                        _status: status,
                        _codeshareStatus: f.codeshareStatus || DISPLAY_DASH,
                        _landedAt: safeLandedAt,
                        _departedAt: safeDepartedAt,
                        _scheduledArr: safeScheduledArr,
                        _scheduledDep: safeScheduledDep,
                        _revisedArr: safeRevisedArr,
                        _predictedArr: safePredictedArr,
                        _runwayArr: safeRunwayArr,
                        _revisedDep: safeRevisedDep,
                        _predictedDep: safePredictedDep,
                        _runwayDep: safeRunwayDep,
                        // Next leg — initially null, filled by secondary call
                        _nextLegFlight: null,
                        _nextLegDest: null,
                        _nextLegDestName: null,
                        _nextLegGate: null,
                        _nextLegTerminal: null,
                        _nextLegAirline: null,
                        _nextScheduledDep: null,
                        _nextRevisedDep: null,
                        _nextPredictedDep: null,
                        _nextRunwayDep: null,
                        _nextLegDataSource: null, // 'api' | null
                        _nextLegLookupMode: null,
                        _nextLegLookupValue: null,
                        _depDelay: normalizeDelay(dep.delay || dep.delayTime),
                        _arrDelay: normalizeDelay(arr2.delay || arr2.delayTime),
                        flight: f.number || f.iataNumber || DISPLAY_DASH,
                        callSign: f.callSign || DISPLAY_DASH,
                        airline: f.airline?.name || DISPLAY_DASH,
                        reg, shipNo, acType,
                        aircraftType: acType,
                        airport: airportDisplay,
                        gate, terminal, baggageBelt,
                        origin: originCode,
                        dest: destCode,
                        originName, destName,
                        iata: f.airline?.iata || DISPLAY_DASH,
                        icao: f.airline?.icao || DISPLAY_DASH,
                    };

                    if (!byId[id] || flightDataScore(parsedFlight) >= flightDataScore(byId[id])) {
                        rawFlightMap[id] = f;
                    }
                    byId[id] = mergeFlightRecords(byId[id], parsedFlight);
                });
            };

            if (Array.isArray(raw)) raw.forEach(f => process([f], 'dep'));
            else { process(raw.arrivals || [], 'arr'); process(raw.departures || [], 'dep'); }

            Object.values(byId).forEach(f => list.push(f));
            enrichSiblingFlights(list);

            // Cross-match arrivals → departures within the same FIDS pull
            // (existing logic — still useful as a quick fallback before secondary call)
            const departures = list.filter(f => f._direction === 'departure');
            const arrivals = list.filter(f => f._direction === 'arrival');
            arrivals.forEach(arrival => {
                const arrivalTime = parseTS(arrivalBasisTime(arrival));
                const match = departures
                    .filter(dep => {
                        const sameReg = arrival.reg !== DISPLAY_DASH && dep.reg === arrival.reg;
                        const sameShip = arrival.shipNo !== DISPLAY_DASH && dep.shipNo === arrival.shipNo;
                        return sameReg || sameShip;
                    })
                    .filter(dep => {
                        const depTime = parseTS(departureBasisTime(dep));
                        if (!arrivalTime || !depTime) return true;
                        return depTime.getTime() >= arrivalTime.getTime() - 30 * 60000;
                    })
                    .sort((a, b) => {
                        const at = parseTS(departureBasisTime(a));
                        const bt = parseTS(departureBasisTime(b));
                        return (at ? at.getTime() : Number.MAX_SAFE_INTEGER) - (bt ? bt.getTime() : Number.MAX_SAFE_INTEGER);
                    })[0];

                if (!match) return;
                // Only set from FIDS cross-match if not already set by API

        function updateWindowNote() {
            const start = new Date();

        function buildTimeWindow() {
            const start = new Date();
            const end = new Date(start.getTime() + NOW_WINDOW_HOURS * 60 * 60000);
            return { start, end, startStr: fmtApiDateTime(start), endStr: fmtApiDateTime(end) };
        }

        function splitTimeWindow(start, end, maxHours = MAX_API_WINDOW_HOURS) {
            const windows = [];
            const maxMs = maxHours * 60 * 60000;
            let cursor = new Date(start);
            while (cursor < end) {
                const chunkEnd = new Date(Math.min(cursor.getTime() + maxMs, end.getTime()));
                windows.push({
                    start: new Date(cursor),
                    end: new Date(chunkEnd),
                    startStr: fmtApiDateTime(cursor),
                    endStr: fmtApiDateTime(chunkEnd),
                });
                cursor = chunkEnd;
            }
            return windows;
        }

        async function fetchAirportWindow(icao, apiKey, startStr, endStr) {
            const url = `https://aerodatabox.p.rapidapi.com/flights/airports/icao/${encodeURIComponent(icao)}/${encodeURIComponent(startStr)}/${encodeURIComponent(endStr)}?withLeg=true&direction=Both&withCancelled=false&withCodeshared=true&withCargo=false&withPrivate=false`;
            const res = await fetch(url, {
                headers: { 'x-rapidapi-host': 'aerodatabox.p.rapidapi.com', 'x-rapidapi-key': apiKey }
            });
            const rawText = await res.text();

            if (!res.ok) {
                let detail = '';
                try { detail = JSON.parse(rawText)?.message || rawText.slice(0, 120); } catch { detail = rawText.slice(0, 120); }
                if (res.status === 401 || res.status === 403) throw new Error('Invalid or expired API key (HTTP ' + res.status + ').');
                if (res.status === 404) throw new Error('Airport "' + icao + '" not found. Double-check the ICAO code.');
                if (res.status === 429) throw new Error('Rate limit hit. Wait a moment and try again.');
                throw new Error('API error ' + res.status + (detail ? ': ' + detail : '.'));
            }

            if (!rawText || rawText.trim() === '') return { arrivals: [], departures: [] };

            try { return JSON.parse(rawText); }
            catch { throw new Error('Could not parse API response: ' + rawText.slice(0, 80)); }
        }

        // ─── MAIN FETCH ───
        async function fetchFlights() {

            errEl.style.display = 'none'; errEl.textContent = '';

            const { start, end, startStr, endStr } = buildTimeWindow();
            const windows = splitTimeWindow(start, end);

            try {
                const combined = { arrivals: [], departures: [] };
                for (const window of windows) {
                    const json = await fetchAirportWindow(icao, apiKey, window.startStr, window.endStr);
                    if (Array.isArray(json?.arrivals)) combined.arrivals.push(...json.arrivals);
